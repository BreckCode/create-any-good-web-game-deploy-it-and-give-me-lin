<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neon Vortex — 3D Tunnel Runner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <!-- Menu Screen -->
    <div id="menu-screen" class="overlay">
      <div class="overlay-content">
        <h1 class="game-title">NEON<br>VORTEX</h1>
        <p class="subtitle">3D TUNNEL RUNNER</p>
        <button id="start-btn" class="game-btn pulse">START GAME</button>
        <div class="controls-info">
          <p class="controls-header">CONTROLS</p>
          <p>WASD / Arrow Keys — Move</p>
          <p>Mouse / Touch — Steer</p>
          <p>P — Pause</p>
        </div>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div id="hud-top">
        <div id="hud-score">
          <span class="hud-label">SCORE</span>
          <span id="score-value">0</span>
        </div>
        <div id="hud-speed">
          <span class="hud-label">SPEED</span>
          <span id="speed-value">1x</span>
        </div>
        <div id="hud-highscore">
          <span class="hud-label">HI-SCORE</span>
          <span id="highscore-value">0</span>
        </div>
      </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pause-screen" class="overlay hidden">
      <div class="overlay-content">
        <h2 class="pause-title">PAUSED</h2>
        <button id="resume-btn" class="game-btn">RESUME</button>
        <button id="quit-btn" class="game-btn game-btn-secondary">QUIT TO MENU</button>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="overlay hidden">
      <div class="overlay-content">
        <h2 class="gameover-title">GAME OVER</h2>
        <div class="final-score">
          <p class="final-score-label">DISTANCE</p>
          <p id="final-score-value" class="final-score-number">0</p>
        </div>
        <div class="final-score">
          <p class="final-score-label">HIGH SCORE</p>
          <p id="final-highscore-value" class="final-score-number">0</p>
        </div>
        <p id="new-highscore-msg" class="new-highscore hidden">NEW HIGH SCORE!</p>
        <button id="restart-btn" class="game-btn">PLAY AGAIN</button>
        <button id="menu-btn" class="game-btn game-btn-secondary">MAIN MENU</button>
      </div>
    </div>

    <!-- Mute Toggle -->
    <button id="mute-btn" class="mute-btn" title="Toggle Sound">&#x1f50a;</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
